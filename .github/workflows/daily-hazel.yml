name: Daily Hazel

on:
  workflow_dispatch:

jobs:
  send-hazel-brief:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check Chicago run window
        id: gate
        env:
          TARGET_HOUR: 7
          TARGET_MINUTE: 30
          BUFFER_MINUTES: 40
        run: node ./scripts/should-run-daily.mjs

      - name: Send Hazel Telegram brief
        if: steps.gate.outputs.should_run == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node ./scripts/send-telegram-hazel.mjs
